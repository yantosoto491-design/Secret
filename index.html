<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Unfold Me</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
overflow:hidden;
color:white;
padding:20px;
text-align:center;
}

.container{
width:100%;
max-width:850px;
}

h1{
font-size:44px;
margin-bottom:10px;
letter-spacing:2px;
}

h2{
font-size:20px;
font-weight:normal;
opacity:.9;
margin-bottom:25px;
}

.note{
position:relative;
width:100%;
max-width:760px;
height:430px;
margin:auto;
perspective:1400px;
cursor:pointer;
}

.paper{
position:absolute;
inset:0;
background:#f8fafc;
border-radius:18px;
overflow:hidden;
box-shadow:0 20px 40px rgba(0,0,0,.45);
}

.left,.right{
position:absolute;
top:0;
width:50%;
height:100%;
background:linear-gradient(145deg,#ffffff,#dbeafe);
z-index:5;
transition:1.2s ease;
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
font-weight:bold;
color:#111827;
}

.left{
left:0;
border-right:1px solid rgba(0,0,0,.08);
transform-origin:left center;
}

.right{
right:0;
border-left:1px solid rgba(0,0,0,.08);
transform-origin:right center;
}

.content{
position:absolute;
inset:0;
padding:18px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:14px;
opacity:0;
transition:1s;
}

.content video{
width:100%;
max-width:680px;
height:300px;
border:none;
border-radius:14px;
object-fit:cover;
box-shadow:0 10px 20px rgba(0,0,0,.25);
}

.content p{
font-size:28px;
font-weight:bold;
color:#ef4444;
animation:pulse .8s infinite;
}

.open .left{
transform:rotateY(-150deg) translateX(-35px);
}

.open .right{
transform:rotateY(150deg) translateX(35px);
}

.open .content{
opacity:1;
transition-delay:.8s;
}

.tip{
margin-top:18px;
opacity:.8;
font-size:15px;
}

#flash{
position:fixed;
inset:0;
background:white;
opacity:0;
pointer-events:none;
}

.confetti{
position:fixed;
width:12px;
height:12px;
top:-20px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(720deg);
}
}

@keyframes pulse{
0%,100%{transform:scale(1);}
50%{transform:scale(1.08);}
}

@media(max-width:700px){
.note{height:360px;}
.content video{height:220px;}
h1{font-size:34px;}
}
</style>
</head>
<body>

<div id="flash"></div>

<div class="container">

<h1>Aku mau ngomong sesuatu🤭...<br></h1>

<div class="note" id="note">
<div class="paper">

<div class="left">⬅ Geser</div>
<div class="right">Geser ➡</div>

<div class="content">

<video id="vid" autoplay muted>
<source src="rickroll.mp4" type="video/mp4">
</video>

<p>YOU GOT RICKROLLED 😝</p>

</div>
</div>
</div>

<div class="tip">Swipe / drag lipatan</div>

</div>

<script>
const note=document.getElementById("note");
const vid=document.getElementById("vid");
const flash=document.getElementById("flash");

let opened=false;
let startX=0;

function prankOpen(){
if(opened) return;
opened=true;

note.classList.add("open");

setTimeout(()=>{
vid.play().catch(()=>{});
},900);

flash.style.opacity="1";
setTimeout(()=>flash.style.opacity="0",180);

if(navigator.vibrate){
navigator.vibrate([200,100,200,100,300]);
}

for(let i=0;i<70;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background=`hsl(${Math.random()*360},100%,50%)`;
c.style.animationDuration=(Math.random()*3+2)+"s";
document.body.appendChild(c);

setTimeout(()=>c.remove(),5000);
}
}

note.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

note.addEventListener("touchmove",e=>{
let diff=e.touches[0].clientX-startX;
if(Math.abs(diff)>60) prankOpen();
});

note.addEventListener("mousedown",e=>{
startX=e.clientX;

function move(ev){
let diff=ev.clientX-startX;
if(Math.abs(diff)>60){
prankOpen();
window.removeEventListener("mousemove",move);
}
}

window.addEventListener("mousemove",move);

window.addEventListener("mouseup",()=>{
window.removeEventListener("mousemove",move);
},{once:true});
});
</script>
</body>
</html>
